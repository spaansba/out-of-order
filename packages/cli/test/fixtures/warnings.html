<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Backward visual hop</title>
    <style>
      button {
        position: absolute;
        left: 20px;
        width: 120px;
        height: 40px;
      }
    </style>
  </head>
  <body>
    <button style="top: 300px">First in DOM, lower on screen</button>
    <button style="top: 20px">Second in DOM, higher on screen</button>
  </body>
</html>
